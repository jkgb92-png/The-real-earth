<!DOCTYPE html>
<!--
  apps/web/public/globe.html

  Standalone CesiumJS 3D Globe page.
  Loaded inside an iframe by GlobeIframe.tsx.

  URL params:
    tileServer  — base URL of the FastAPI tile server
    cesiumToken — Cesium Ion access token (optional)

  Features
  --------
  - NASA GIBS Blue Marble base imagery
  - NASA Black Marble (VIIRS city lights) blended on night side
  - ISS live position with billboard + trail polyline
  - Translucent ISS orbit shell at ~420 km altitude
  - Rayleigh atmospheric scattering (enhanced: limb brightening + chromatic sunset)
  - Auto-spin on idle (10 s timeout), halts on any interaction
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Real Earth — Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      background: #0a0a1a;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    // ── URL params ──────────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const tileServer = params.get('tileServer') || 'http://localhost:8000';
    const cesiumToken = params.get('cesiumToken') || '';

    if (cesiumToken) Cesium.Ion.defaultAccessToken = cesiumToken;

    // ── Viewer ──────────────────────────────────────────────────────────────
    const creditDiv = document.createElement('div');
    const viewer = new Cesium.Viewer('cesiumContainer', {
      imageryProvider: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      creditContainer: creditDiv,
    });

    // ── Phase 4.1: NASA GIBS Blue Marble base + Black Marble city lights ────
    // Blue Marble (day)
    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: `${tileServer}/tiles/gibs/{z}/{x}/{reverseY}.jpg`,
        maximumLevel: 8,
        credit: 'NASA GIBS / Blue Marble',
      })
    );

    // Black Marble (city lights) — second layer, visible on night side
    const blackMarbleProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{reverseY}/{x}.jpg',
      maximumLevel: 8,
      credit: 'NASA GIBS / Black Marble',
    });
    const cityLightsLayer = viewer.imageryLayers.addImageryProvider(blackMarbleProvider);
    // Blend using 'multiply' equivalent: only bright on night side
    cityLightsLayer.nightAlpha = 1.0;
    cityLightsLayer.dayAlpha = 0.0;

    // ── Phase 4.4: Enhanced Rayleigh + limb brightening + chromatic sunset ──
    const enhancedAtmosphereShader = `
      uniform sampler2D colorTexture;
      uniform float altitude;
      in vec2 v_textureCoordinates;

      void main() {
        vec4 color = texture(colorTexture, v_textureCoordinates);

        // Rayleigh scale height ~8500 m — scattering diminishes exponentially
        float scatter = exp(-altitude / 8500.0);

        // Primary blue sky scatter
        vec3 blueScatter = vec3(0.18, 0.36, 0.72);

        // Limb brightening: pixels near screen edge get stronger atmosphere halo
        vec2 uv = v_textureCoordinates * 2.0 - 1.0;
        float r2 = dot(uv, uv);
        float limb = smoothstep(0.5, 1.0, r2) * 0.5;

        // Chromatic sunset: at low altitudes blend in warm red-orange tones
        // proportional to horizontal position (approximates terminator zones)
        float sunsetFactor = scatter * (1.0 - abs(uv.y)) * 0.6;
        vec3 sunsetColor = vec3(0.85, 0.45, 0.12);

        // Combine scatter, limb halo, and sunset chromatic dispersion
        vec3 atmo = mix(blueScatter, sunsetColor, clamp(sunsetFactor * 0.4, 0.0, 0.5));
        color.rgb = mix(color.rgb, atmo, scatter * 0.38 + limb * 0.25);

        out_FragColor = color;
      }
    `;

    viewer.scene.postProcessStages.add(
      new Cesium.PostProcessStage({
        fragmentShader: enhancedAtmosphereShader,
        uniforms: {
          altitude: function () {
            return viewer.camera.positionCartographic.height;
          },
        },
      })
    );

    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyAtmosphere.show = true;
    viewer.scene.skyAtmosphere.hueShift = -0.03;
    viewer.scene.skyAtmosphere.saturationShift = 0.1;
    viewer.scene.skyAtmosphere.brightnessShift = 0.02;

    // ── Phase 4.2: ISS orbit shell (translucent ellipsoid at ~420 km) ───────
    const EARTH_RADIUS_M = 6_371_000;
    const ISS_ALTITUDE_M =   420_000;
    const shellRadius = EARTH_RADIUS_M + ISS_ALTITUDE_M;

    viewer.scene.primitives.add(
      new Cesium.EllipsoidPrimitive({
        center: Cesium.Cartesian3.ZERO,
        radii: new Cesium.Cartesian3(shellRadius, shellRadius, shellRadius * 0.995),
        appearance: new Cesium.EllipsoidSurfaceAppearance({
          material: Cesium.Material.fromType('Color', {
            color: new Cesium.Color(0.12, 0.45, 1.0, 0.04),
          }),
          aboveGround: true,
        }),
        modelMatrix: Cesium.Matrix4.IDENTITY.clone(),
      })
    );

    // ── Phase 4.3: ISS live position entity ─────────────────────────────────
    const ISS_API = 'https://api.wheretheiss.at/v1/satellites/25544';
    const issPositions = new Cesium.SampledPositionProperty();
    issPositions.backwardExtrapolationType = Cesium.ExtrapolationType.HOLD;
    issPositions.forwardExtrapolationType  = Cesium.ExtrapolationType.HOLD;

    const issEntity = viewer.entities.add({
      position: issPositions,
      label: {
        text: '🛰 ISS',
        font: '13px sans-serif',
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        outlineWidth: 2,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -14),
        fillColor: Cesium.Color.fromCssColorString('#34d399'),
        outlineColor: Cesium.Color.BLACK,
        showBackground: true,
        backgroundColor: new Cesium.Color(0.05, 0.08, 0.15, 0.8),
        backgroundPadding: new Cesium.Cartesian2(6, 4),
      },
      point: {
        pixelSize: 8,
        color: Cesium.Color.fromCssColorString('#34d399'),
        outlineColor: Cesium.Color.fromCssColorString('#0a3'),
        outlineWidth: 2,
      },
      path: {
        resolution: 60,
        leadTime: 0,
        trailTime: 600,
        width: 1.5,
        material: new Cesium.PolylineGlowMaterialProperty({
          glowPower: 0.2,
          color: Cesium.Color.fromCssColorString('#34d399').withAlpha(0.5),
        }),
      },
    });

    let issTrailCoords = [];

    async function fetchISS() {
      try {
        const res = await fetch(ISS_API);
        if (!res.ok) return;
        const d = await res.json();
        const altitude = (d.altitude != null ? d.altitude : 420) * 1000; // km → m
        const pos = Cesium.Cartesian3.fromDegrees(d.longitude, d.latitude, altitude);
        const now = Cesium.JulianDate.now();
        issPositions.addSample(now, pos);
        issEntity.position = pos;
      } catch (_) { /* silently ignore */ }
    }

    fetchISS();
    setInterval(fetchISS, 5000);

    // ── Phase 4.3: Auto-spin on idle ─────────────────────────────────────────
    let idleTimer = null;
    let spinning  = false;
    let spinRafId  = null;

    function startSpin() {
      if (spinning) return;
      spinning = true;
      const spinStep = () => {
        if (!spinning) return;
        viewer.camera.rotateRight(0.0008);
        spinRafId = requestAnimationFrame(spinStep);
      };
      spinRafId = requestAnimationFrame(spinStep);
    }

    function stopSpin() {
      spinning = false;
      if (spinRafId) {
        cancelAnimationFrame(spinRafId);
        spinRafId = null;
      }
    }

    function resetIdle() {
      stopSpin();
      clearTimeout(idleTimer);
      idleTimer = setTimeout(startSpin, 10_000);
    }

    // Wire up interaction events that reset idle timer
    ['mousemove', 'mousedown', 'touchstart', 'wheel', 'keydown'].forEach((ev) => {
      document.addEventListener(ev, resetIdle, { passive: true });
    });

    // Start idle timer on load
    resetIdle();
  </script>
</body>
</html>
