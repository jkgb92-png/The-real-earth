<!DOCTYPE html>
<!--
  apps/web/public/globe.html

  Standalone CesiumJS 3D Globe page.
  Loaded inside an iframe by GlobeIframe.tsx.

  URL params:
    tileServer  — base URL of the FastAPI tile server
    cesiumToken — Cesium Ion access token (optional)
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Real Earth — Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      background: #0a0a1a;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const tileServer = params.get('tileServer') || 'http://localhost:8000';
    const cesiumToken = params.get('cesiumToken') || '';

    if (cesiumToken) Cesium.Ion.defaultAccessToken = cesiumToken;

    const creditDiv = document.createElement('div');
    const viewer = new Cesium.Viewer('cesiumContainer', {
      imageryProvider: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      creditContainer: creditDiv,
    });

    // NASA GIBS Blue Marble base layer
    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: `${tileServer}/tiles/gibs/{z}/{x}/{reverseY}.jpg`,
        maximumLevel: 8,
        credit: 'NASA GIBS / Blue Marble',
      })
    );

    // Rayleigh scattering atmosphere shader
    const rayleighShader = `
      uniform sampler2D colorTexture;
      uniform float altitude;
      in vec2 v_textureCoordinates;
      void main() {
        vec4 color = texture(colorTexture, v_textureCoordinates);
        float scatter = exp(-altitude / 8500.0);
        vec3 sky = vec3(0.18, 0.36, 0.72);
        color.rgb = mix(color.rgb, sky, scatter * 0.4);
        out_FragColor = color;
      }
    `;

    viewer.scene.postProcessStages.add(
      new Cesium.PostProcessStage({
        fragmentShader: rayleighShader,
        uniforms: {
          altitude: function () {
            return viewer.camera.positionCartographic.height;
          },
        },
      })
    );

    viewer.scene.globe.enableLighting = true;
    viewer.scene.skyAtmosphere.show = true;
  </script>
</body>
</html>
