<!DOCTYPE html>
<!--
  apps/web/public/globe.html

  Standalone CesiumJS 3D Globe page.
  Loaded inside an iframe by GlobeIframe.tsx.

  URL params:
    tileServer  — base URL of the FastAPI tile server
    cesiumToken — Cesium Ion access token (optional)

  Features
  --------
  - NASA GIBS Blue Marble base imagery
  - NASA Black Marble (VIIRS city lights) blended on night side
  - ISS live position with billboard + trail polyline
  - Translucent ISS orbit shell at ~420 km altitude
  - Rayleigh atmospheric scattering (enhanced: limb brightening + chromatic sunset)
  - Auto-spin on idle (10 s timeout), halts on any interaction
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Real Earth — Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
      background: #0a0a1a;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    // ── URL params ──────────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const tileServer = params.get('tileServer') || 'http://localhost:8000';
    const cesiumToken = params.get('cesiumToken') || '';

    // BlueMarble_NextGeneration is only available from GIBS in EPSG:4326
    // (the epsg3857 endpoint returns 400 for this layer).  Both the
    // tile-server proxy path and the direct fallback therefore use EPSG:4326
    // coordinates via Cesium's GeographicTilingScheme.
    // WMTS TileRow 0 is the northernmost row, which matches Cesium's {y}
    // template variable (y=0 at top); {reverseY} would flip tiles north/south.
    const GIBS_EPSG4326_BASE = 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best';

    const TILE_SERVER_DEFAULT = 'http://localhost:8000';
    const useProxy = tileServer && tileServer !== TILE_SERVER_DEFAULT;
    const gibsBlueMarbleUrl = useProxy
      ? `${tileServer}/tiles/gibs/{z}/{x}/{y}.jpg`
      : `${GIBS_EPSG4326_BASE}/BlueMarble_NextGeneration/default/2004-08-01/500m/{z}/{y}/{x}.jpg`;

    if (cesiumToken) Cesium.Ion.defaultAccessToken = cesiumToken;

    // ── Viewer ──────────────────────────────────────────────────────────────
    const creditDiv = document.createElement('div');
    const viewer = new Cesium.Viewer('cesiumContainer', {
      imageryProvider: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      creditContainer: creditDiv,
    });

    // ── IR: MODIS Terra Land Surface Temperature overlay ────────────────────
    // Added with alpha=0 initially; toggled and intensity-controlled via
    // postMessage from GlobeIframe.tsx (type: 'irLayer').
    const irProvider = new Cesium.UrlTemplateImageryProvider({
      url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/MODIS_Terra_Land_Surface_Temp_Day/default/2023-07-01/1km/{z}/{y}/{x}.png',
      tilingScheme: new Cesium.GeographicTilingScheme(),
      tileWidth: 256,
      tileHeight: 256,
      maximumLevel: 7,
      credit: 'NASA GIBS / MODIS LST',
    });
    const irLayer = viewer.imageryLayers.addImageryProvider(irProvider);
    irLayer.alpha = 0.0;

    // Handle IR layer messages from the React parent (GlobeIframe.tsx)
    window.addEventListener('message', (e) => {
      if (!e.data || e.data.type !== 'irLayer') return;
      const { enabled, intensity } = e.data;
      irLayer.alpha = enabled ? Math.max(0, Math.min(1, intensity ?? 0.6)) : 0.0;
    });

    // ── Phase 4.1: NASA GIBS Blue Marble base + Black Marble city lights ────
    // Blue Marble (day) — EPSG:4326 tiles with geographic tiling scheme.
    // Tile size is 512×512 px; maximumLevel 8 matches GIBS 250 m resolution.
    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: gibsBlueMarbleUrl,
        tilingScheme: new Cesium.GeographicTilingScheme(),
        tileWidth: 512,
        tileHeight: 512,
        maximumLevel: 8,
        credit: 'NASA GIBS / Blue Marble',
      })
    );

    // ESRI World Imagery — renders at all zoom levels; at z<8 it overlays the
    // GIBS base, and at z≥8 it provides high-resolution detail (Antarctica,
    // coastlines, etc.) that GIBS lacks.
    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        maximumLevel: 19,
        credit: 'Esri World Imagery',
      })
    );

    // Black Marble (city lights) — second layer, visible on night side.
    // Also uses GIBS EPSG:4326 (same GeographicTilingScheme as Blue Marble).
    const blackMarbleProvider = new Cesium.UrlTemplateImageryProvider({
      url: `${GIBS_EPSG4326_BASE}/VIIRS_Black_Marble/default/2016-01-01/500m/{z}/{y}/{x}.jpg`,
      tilingScheme: new Cesium.GeographicTilingScheme(),
      tileWidth: 512,
      tileHeight: 512,
      maximumLevel: 8,
      credit: 'NASA GIBS / Black Marble',
    });
    const cityLightsLayer = viewer.imageryLayers.addImageryProvider(blackMarbleProvider);
    // Blend using 'multiply' equivalent: only bright on night side
    cityLightsLayer.nightAlpha = 1.0;
    cityLightsLayer.dayAlpha = 0.0;

    // ── Phase 4.4: Enhanced Rayleigh + limb brightening + chromatic sunset ──
    const enhancedAtmosphereShader = `
      uniform sampler2D colorTexture;
      uniform float altitude;

      in vec2 v_textureCoordinates;

      void main() {
        vec4 color = texture(colorTexture, v_textureCoordinates);

        // Rayleigh scale height ~8500 m — scattering diminishes exponentially
        // with altitude.  Guard against altitude ≤ 0 (camera below ellipsoid
        // at initialisation or deep zoom) which would make exp() return > 1
        // and extrapolate colours out of range.
        float scatter = exp(-max(altitude, 0.0) / 8500.0);

        // Primary blue sky scatter
        vec3 blueScatter = vec3(0.18, 0.36, 0.72);

        // Limb brightening: pixels near screen edge get stronger atmosphere halo
        vec2 uv = v_textureCoordinates * 2.0 - 1.0;
        float r2 = dot(uv, uv);
        float limb = smoothstep(0.5, 1.0, r2) * 0.5;

        // Chromatic sunset: at low altitudes blend in warm red-orange tones
        // proportional to horizontal position (approximates terminator zones)
        float sunsetFactor = scatter * (1.0 - abs(uv.y)) * 0.6;
        vec3 sunsetColor = vec3(0.85, 0.45, 0.12);

        // Combine scatter, limb halo, and sunset chromatic dispersion
        vec3 atmo = mix(blueScatter, sunsetColor, clamp(sunsetFactor * 0.4, 0.0, 0.5));
        color.rgb = mix(color.rgb, atmo, scatter * 0.38 + limb * 0.25);

        out_FragColor = color;
      }
    `;

    viewer.scene.postProcessStages.add(
      new Cesium.PostProcessStage({
        fragmentShader: enhancedAtmosphereShader,
        uniforms: {
          altitude: function () {
            return viewer.camera.positionCartographic.height;
          },
        },
      })
    );

    viewer.scene.globe.enableLighting = true;
    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#050814');
    viewer.scene.skyAtmosphere.show = true;
    viewer.scene.skyAtmosphere.hueShift = -0.03;
    viewer.scene.skyAtmosphere.saturationShift = 0.1;
    viewer.scene.skyAtmosphere.brightnessShift = 0.02;
    // Request tiles at 1:1 screen pixels — eliminates blurry upscaling.
    // Default is 2 (half-resolution); 1 forces native-resolution tile selection.
    viewer.scene.globe.maximumScreenSpaceError = 1;
    // Render at native device pixel ratio for crisp imagery on Retina/HiDPI
    // screens.  Cap at 2× to avoid excessive GPU overhead on very high-DPI
    // devices (3×, 4×) where the incremental sharpness gain is imperceptible.
    viewer.resolutionScale = Math.min(window.devicePixelRatio || 1, 2);

    // ── Phase 4.2: ISS orbit shell (translucent ellipsoid at ~420 km) ───────
    const EARTH_RADIUS_M = 6_371_000;
    const ISS_ALTITUDE_M =   420_000;
    const shellRadius = EARTH_RADIUS_M + ISS_ALTITUDE_M;

    viewer.scene.primitives.add(
      new Cesium.EllipsoidPrimitive({
        center: Cesium.Cartesian3.ZERO,
        radii: new Cesium.Cartesian3(shellRadius, shellRadius, shellRadius * 0.995),
        appearance: new Cesium.EllipsoidSurfaceAppearance({
          material: Cesium.Material.fromType('Color', {
            color: new Cesium.Color(0.12, 0.45, 1.0, 0.04),
          }),
          aboveGround: true,
        }),
        modelMatrix: Cesium.Matrix4.IDENTITY.clone(),
      })
    );

    // ── Phase 4.3: ISS live position entity ─────────────────────────────────
    const ISS_API = 'https://api.wheretheiss.at/v1/satellites/25544';
    const issPositions = new Cesium.SampledPositionProperty();
    issPositions.backwardExtrapolationType = Cesium.ExtrapolationType.HOLD;
    issPositions.forwardExtrapolationType  = Cesium.ExtrapolationType.HOLD;

    const issEntity = viewer.entities.add({
      position: issPositions,
      label: {
        text: '🛰 ISS',
        font: '13px sans-serif',
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        outlineWidth: 2,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -14),
        fillColor: Cesium.Color.fromCssColorString('#34d399'),
        outlineColor: Cesium.Color.BLACK,
        showBackground: true,
        backgroundColor: new Cesium.Color(0.05, 0.08, 0.15, 0.8),
        backgroundPadding: new Cesium.Cartesian2(6, 4),
      },
      point: {
        pixelSize: 8,
        color: Cesium.Color.fromCssColorString('#34d399'),
        outlineColor: Cesium.Color.fromCssColorString('#0a3'),
        outlineWidth: 2,
      },
      path: {
        resolution: 60,
        leadTime: 0,
        trailTime: 600,
        width: 1.5,
        material: new Cesium.PolylineGlowMaterialProperty({
          glowPower: 0.2,
          color: Cesium.Color.fromCssColorString('#34d399').withAlpha(0.5),
        }),
      },
    });

    let issTrailCoords = [];

    async function fetchISS() {
      try {
        const res = await fetch(ISS_API);
        if (!res.ok) return;
        const d = await res.json();
        const altitude = (d.altitude != null ? d.altitude : 420) * 1000; // km → m
        const pos = Cesium.Cartesian3.fromDegrees(d.longitude, d.latitude, altitude);
        const now = Cesium.JulianDate.now();
        issPositions.addSample(now, pos);
        issEntity.position = pos;
      } catch (_) { /* silently ignore */ }
    }

    fetchISS();
    setInterval(fetchISS, 5000);

    // ── Phase 4.3: Auto-spin on idle ─────────────────────────────────────────
    let idleTimer = null;
    let spinning  = false;
    let spinRafId  = null;

    function startSpin() {
      if (spinning) return;
      spinning = true;
      const spinStep = () => {
        if (!spinning) return;
        viewer.camera.rotateRight(0.0008);
        spinRafId = requestAnimationFrame(spinStep);
      };
      spinRafId = requestAnimationFrame(spinStep);
    }

    function stopSpin() {
      spinning = false;
      if (spinRafId) {
        cancelAnimationFrame(spinRafId);
        spinRafId = null;
      }
    }

    function resetIdle() {
      stopSpin();
      clearTimeout(idleTimer);
      idleTimer = setTimeout(startSpin, 10_000);
    }

    // Wire up interaction events that reset idle timer
    ['mousemove', 'mousedown', 'touchstart', 'wheel', 'keydown'].forEach((ev) => {
      document.addEventListener(ev, resetIdle, { passive: true });
    });

    // Start idle timer on load
    resetIdle();
  </script>

  <!-- ── Spec-Ops Three.js overlay canvas ─────────────────────────────────── -->
  <canvas id="specOpsCanvas" style="
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  "></canvas>

  <script>
    // ── Spec-Ops Worker bridge ───────────────────────────────────────────────
    // The main thread initialises the worker, transfers the OffscreenCanvas,
    // and then forwards all DOM events + specOps commands into the worker.
    // No Three.js code lives here — it all runs in spec-ops-worker.js.
    (function () {
      'use strict';

      const canvas   = document.getElementById('specOpsCanvas');
      let   worker   = null;

      // Track which features are currently active so the canvas opacity can be
      // managed correctly (transparent when all features are off).
      const featureState = {
        subsurface: false,
        heroAsset:  false,
        scanner:    false,
        livePulse:  false,
      };

      function anyActive() {
        return Object.values(featureState).some(Boolean);
      }

      function updateCanvasVisibility() {
        if (anyActive()) {
          canvas.style.opacity       = '1';
          canvas.style.pointerEvents = 'auto';
        } else {
          canvas.style.opacity       = '0';
          canvas.style.pointerEvents = 'none';
        }
      }

      // ── Initialise worker + transfer OffscreenCanvas ─────────────────────
      function ensureWorker() {
        if (worker) return;

        if (typeof canvas.transferControlToOffscreen !== 'function') {
          // OffscreenCanvas not supported — log warning, degrade gracefully.
          console.warn('[SpecOps] OffscreenCanvas not supported in this browser. ' +
                       'Spec-Ops Three.js features will not render.');
          // Notify parent React app so the SpecOpsToolbar can be hidden.
          window.parent.postMessage({ type: 'specOpsUnavailable' }, window.parent.location.origin || '*');
          return;
        }

        const offscreen  = canvas.transferControlToOffscreen();
        // Use a plain relative path so the worker resolves to the same
        // directory as globe.html regardless of basePath.  This works on
        // GitHub Pages (/The-real-earth/) and in local dev without any
        // special configuration.
        const workerUrl  = './spec-ops-worker.js';
        const googleKey  = new URLSearchParams(location.search).get('googleApiKey') || '';

        worker = new Worker(workerUrl);
        worker.onmessage = handleWorkerMessage;
        worker.onerror   = (e) => console.error('[SpecOps] Worker error:', e);

        worker.postMessage({
          type:   'init',
          canvas: offscreen,
          width:  window.innerWidth,
          height: window.innerHeight,
          apiKey: googleKey,
        }, [offscreen]);

        // Resize
        window.addEventListener('resize', () => {
          if (worker) {
            worker.postMessage({
              type:   'resize',
              width:  window.innerWidth,
              height: window.innerHeight,
            });
          }
        });

        // Mouse events — forwarded to orbit controller in worker.
        canvas.addEventListener('mousedown', (e) => {
          if (e.button === 2) e.preventDefault(); // block context menu on right-drag
          worker.postMessage({ type: 'mousedown', button: e.button, x: e.clientX, y: e.clientY });
        });
        window.addEventListener('mouseup', (e) => {
          worker.postMessage({ type: 'mouseup', button: e.button });
        });
        canvas.addEventListener('mousemove', (e) => {
          worker.postMessage({ type: 'mousemove', x: e.clientX, y: e.clientY });
        });
        canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          worker.postMessage({ type: 'wheel', deltaY: e.deltaY });
        }, { passive: false });
        canvas.addEventListener('contextmenu', (e) => {
          e.preventDefault(); // prevent OS context menu interfering with right-click pan
        });
        canvas.addEventListener('dblclick', () => {
          worker.postMessage({ type: 'dblclick' }); // reset camera to default view
        });

        // Touch events — single-finger orbit, two-finger pinch-to-zoom.
        let lastTouchDist = 0;
        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            const t = e.touches[0];
            worker.postMessage({ type: 'mousedown', button: 0, x: t.clientX, y: t.clientY });
          } else if (e.touches.length === 2) {
            // Transition from single-finger drag to pinch — end any drag first.
            worker.postMessage({ type: 'mouseup', button: 0 });
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.hypot(dx, dy);
            worker.postMessage({ type: 'pinch', dist: lastTouchDist });
          }
        }, { passive: true });
        canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length === 1) {
            const t = e.touches[0];
            worker.postMessage({ type: 'mousemove', x: t.clientX, y: t.clientY });
          } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            worker.postMessage({ type: 'pinch', dist });
            lastTouchDist = dist;
          }
        }, { passive: true });
        canvas.addEventListener('touchend', (e) => {
          if (e.touches.length === 0) {
            worker.postMessage({ type: 'mouseup', button: 0 });
            worker.postMessage({ type: 'pinchend' });
          } else if (e.touches.length === 1) {
            // Pinch ended — resume single-finger drag from remaining touch.
            worker.postMessage({ type: 'pinchend' });
            const t = e.touches[0];
            worker.postMessage({ type: 'mousedown', button: 0, x: t.clientX, y: t.clientY });
          }
        }, { passive: true });
      }

      // ── Web Audio — data-burst chirp ────────────────────────────────────────
      // Played on the main thread (Web Audio is not available in workers).
      // Uses a short oscillator burst filtered through a high-pass to give the
      // "data packet zip" sound without any external audio assets.
      let audioCtx = null;
      function playDataBurstChirp() {
        try {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          // Resume context if suspended by autoplay policy.
          if (audioCtx.state === 'suspended') audioCtx.resume();

          const now = audioCtx.currentTime;

          // Oscillator: frequency sweeps 2 kHz → 4 kHz in 80 ms (upward chirp).
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(2000, now);
          osc.frequency.exponentialRampToValueAtTime(4000, now + 0.08);

          // High-pass filter at 1.5 kHz removes low rumble, keeps it crisp.
          const hpf = audioCtx.createBiquadFilter();
          hpf.type = 'highpass';
          hpf.frequency.value = 1500;
          hpf.Q.value = 0.7;

          // Short amplitude envelope: attack 5 ms, decay 75 ms → total ≈ 80 ms.
          const gain = audioCtx.createGain();
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.18, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

          osc.connect(hpf);
          hpf.connect(gain);
          gain.connect(audioCtx.destination);

          osc.start(now);
          osc.stop(now + 0.08);
          osc.onended = () => { osc.disconnect(); hpf.disconnect(); gain.disconnect(); };
        } catch (_) { /* silently ignore if Web Audio not available */ }
      }

      // ── Messages from worker ─────────────────────────────────────────────
      function handleWorkerMessage(e) {
        const msg = e.data;
        if (!msg) return;

        if (msg.type === 'scannerComplete') {
          // Scanner finished its 3-pass sequence — notify the React parent.
          window.parent.postMessage({ type: 'specOpsEvent', event: 'scannerComplete' }, '*');
        }

        // Relay camera coordinates to the React parent (SpecOpsToolbar).
        // Wrapped in a 'specOpsWorker' envelope to distinguish from other messages.
        if (msg.type === 'cameraCoords') {
          window.parent.postMessage({ type: 'specOpsWorker', inner: msg }, '*');
        }

        // Play a data-burst chirp whenever a new burst packet fires.
        if (msg.type === 'dataBurst') {
          playDataBurstChirp();
        }

        // heroProximity is handled internally by the worker (cross-fade).
      }

      // ── Listen for specOps commands from the React parent ────────────────
      window.addEventListener('message', (e) => {
        if (!e.data || e.data.type !== 'specOps') return;

        const { feature, enabled } = e.data;
        if (feature in featureState) featureState[feature] = !!enabled;

        ensureWorker();

        if (worker) {
          worker.postMessage({ type: 'specOps', feature, enabled });
        }

        updateCanvasVisibility();
      });
    }());
  </script>
</body>
</html>
